<!DOCTYPE html>
<!-- FAllaria Rhaj Gendrex F. -->
<!-- BSIT - 1st Year -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Regestration Form</title>
</head>
<body  style="background: linear-gradient(to right, #FFE5B4, #FFB347, #FF7F50);">

    <center>
        <h1>Arellano University - Computer Studies Registration Form</h1><br>
        <img src="assets/AUTechLogo.png" width="200" height="200" alt=""><br>
        
        

        <form action="#" method="post" enctype="multipart/form-data">
           
            <table width="600" cellpadding="5" cellspacing="0">
                
               
                <tr>
                    <td><b>Name: </b></td>
                </tr>
                <tr>
                    <td><input type="text" name="firstname" placeholder="First Name" style="width: 95%;" required></td>
                    <td><input type="text" name="lastname" placeholder="Last Name" style="width: 95%;" required></td>
                </tr>

              
                <tr>
                    <td colspan="2"><br><b>Gender:</b></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="radio" name="gender" value="Male"> Male
                        <input type="radio" name="gender" value="Female"> Female
                    </td>
                </tr>

              
                <tr>
                    <td colspan="2"><br><b>Course:</b></td>
                </tr>
               <tr>
                    <td colspan="2">
                        <select name="yearlevel" style="width: 99%;">
                            <option>BSIT</option>
                            <option>BSCS</option>
                            <option>BSCpE</option>
                        </select>
                    </td>
                </tr>

               
                <tr>
                    <td colspan="2"><br><b>Year Level:</b></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <select name="yearlevel" style="width: 99%;">
                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option>3rd Year</option>
                            <option>4th Year</option>
                            <option>irregular</option>
                        </select>
                    </td>
                </tr>

               
                <tr>
                    <td colspan="2"><br><b>Email:</b></td>
                </tr>
                <tr>
                    <td colspan="2"><input type="email" name="email" placeholder="email@example.com" style="width: 98%;" required></td>
                </tr>

              
                <tr>
                    <td colspan="2"><br><b>Birthdate:</b></td>
                </tr>
                <tr>
                    <td colspan="2"><input type="date" name="birthdate" style="width: 98%;" required></td>
                </tr>

               
                <tr>
                    <td colspan="2"><br><b>Address:</b></td>
                </tr>
                <tr>
                    <td colspan="2"><textarea name="address" rows="3" style="width: 98%;" required></textarea></td>
                </tr>

              
                <tr>
                    <td colspan="2"><br><b>Guardian:</b></td>
                </tr>
                <tr>
                    <td colspan="2"><input type="text" name="guardian" style="width: 98%;" required></td>
                </tr>

                
                <tr>
                    <td colspan="2"><br><b>Contact:</b></td>
                </tr>
                <tr>
                    <td colspan="2"><input type="tel" name="contact" placeholder="### ### ####" style="width: 98%;" required></td>
                </tr>

               
                <tr>
                    <td colspan="2"><br><b>Upload 2x2 Picture:</b></td>
                </tr>
                <tr>
                    <td colspan="2"><input type="file" name="picture" style="width: 98%;" required></td>
                </tr>

                
                <tr>
                    <td colspan="2" ><br>
                        <input type="submit" value="Submit Form">
                        <input type="reset" value="Clear Form">
                        <button>Hello World</button>
                    </td>
                </tr>

            </table>
        </form>
    </center>

</body>
</html>
